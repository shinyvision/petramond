<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Llamacraft</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #87acd7; overflow: hidden; font-family: monospace; }
  #canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: crosshair;
    background: #87acd7;
  }
  #overlay {
    position: fixed; left: 8px; top: 8px; color: #fff; text-shadow: 0 0 2px #000;
    font-size: 12px; pointer-events: none; user-select: none;
  }
  #err {
    position: fixed; left: 8px; bottom: 8px; color: #f88; background: rgba(0,0,0,0.6);
    padding: 6px; max-width: 80vw; white-space: pre-wrap;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="overlay">Llamacraft — WASD move, Space up, Shift down, Ctrl boost. Click to capture mouse, Esc releases.</div>
<div id="err"></div>
<script type="module" src="./main.js"></script>
</body>
</html>
